<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="icon" href="data:," /><!-- suppress favicon request; swap for a real icon if desired -->
<title>Explainers — interactive explainers, built for understanding through play</title>
<meta name="description" content="A collection of interactive, visual explainers on interesting topics. Built for understanding through play." />
<meta property="og:title" content="Explainers" />
<meta property="og:description" content="Interactive, visual explainers on interesting topics." />
<meta property="og:type" content="website" />

<style>
/* Shared design tokens — kept in sync with template/index.html so the landing
   page and the explainers look like one site. */
:root {
  --font-prose: Georgia, 'Iowan Old Style', 'Palatino Linotype', 'Times New Roman', serif;
  --font-ui: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace;
  --bg: #fdfdfc;
  --surface: #ffffff;
  --text: #1a1a1a;
  --muted: #6b6b6b;
  --border: #e6e4df;
  --accent: #2563eb;
  --accent-soft: #eaf0ff;
  --shadow: 0 1px 2px rgba(20,20,20,.05), 0 10px 30px rgba(20,20,20,.05);
  --radius: 12px;
}

* { box-sizing: border-box; }
body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-prose);
  font-size: 1.15rem;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}
.wrap { max-width: 920px; margin: 0 auto; padding: 4rem 1.25rem 5rem; }

header { margin-bottom: 3rem; }
h1 {
  font-family: var(--font-ui);
  font-weight: 800;
  font-size: clamp(2.4rem, 8vw, 3.6rem);
  letter-spacing: -0.03em;
  margin: 0 0 .75rem;
}
.tagline { font-size: 1.3rem; color: var(--muted); margin: 0; max-width: 36ch; }
.tagline em { color: var(--text); font-style: italic; }

/* Per-card hue palette. Each class supplies three variables the card styling
   reads: --c (the accent for the date eyebrow, hover border, focus ring),
   --t1 (the soft "glow" tint), and --bd (the resting border). Cards cycle
   through these via the PALETTE array in the render script below. */
.hue-blue   { --c: #2563eb; --t1: #eaf0ff; --bd: #d7e3fb; }
.hue-teal   { --c: #0d9488; --t1: #e2f5f1; --bd: #c4eae2; }
.hue-amber  { --c: #c2710c; --t1: #fbf0dc; --bd: #f0ddb4; }
.hue-violet { --c: #7c3aed; --t1: #f1ebfe; --bd: #e2d6fb; }
.hue-rose   { --c: #e11d48; --t1: #fdebef; --bd: #f7d2da; }
.hue-green  { --c: #15803d; --t1: #e9f6e6; --bd: #cfe9c8; }

/* Article list — a single, comfortably-narrow column of full-width cards.
   (A flex column avoids the auto-fill grid leaving a lone card stranded in
   empty tracks when there are only a few explainers.) */
.grid {
  display: flex; flex-direction: column;
  gap: .85rem;
  max-width: 680px;
  margin: 0;
  padding: 0;
  list-style: none;
}
.card {
  display: flex; flex-direction: column;
  /* Soft "corner glow": the card's hue blooms from the top-left and fades into
     the paper background. */
  background: radial-gradient(130% 130% at 0% 0%, var(--t1), var(--bg) 62%);
  border: 1px solid var(--bd);
  border-radius: var(--radius);
  text-decoration: none;
  color: inherit;
  padding: 1.25rem 1.5rem;
  transition: transform .15s ease, border-color .15s ease, box-shadow .15s ease;
}
.card:hover { transform: translateY(-2px); border-color: var(--c); box-shadow: 0 8px 22px -12px var(--c); }
.card:focus-visible { outline: 2px solid var(--c); outline-offset: 3px; }
.card h2 { font-family: var(--font-ui); font-size: 1.25rem; line-height: 1.25; margin: 0 0 .4rem; letter-spacing: -0.01em; }
.card p { font-size: 1rem; color: var(--muted); margin: 0; }
/* The date now reads as a small colored eyebrow above the title. */
.card .date { font-family: var(--font-ui); font-size: .72rem; color: var(--c); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .45rem; }

/* Empty state (shown until the first explainer is added) */
.empty {
  font-family: var(--font-ui);
  text-align: center;
  color: var(--muted);
  background: var(--surface);
  border: 1px dashed var(--border);
  border-radius: var(--radius);
  padding: 3rem 1.5rem;
}
.empty code { font-family: var(--font-mono); background: var(--accent-soft); padding: .1em .4em; border-radius: 5px; color: var(--text); }

footer {
  font-family: var(--font-ui); font-size: .9rem; color: var(--muted);
  border-top: 1px solid var(--border); margin-top: 4rem; padding-top: 1.5rem;
}
footer a { color: var(--accent); text-decoration: none; }

@media (max-width: 600px) { .wrap { padding: 2.5rem 1.1rem 3.5rem; } body { font-size: 1.08rem; } }
</style>
</head>

<body>
<div class="wrap">

  <header>
    <h1>Explainers</h1>
    <p class="tagline">Interactive, visual explainers on interesting topics — <em>built for understanding through play.</em></p>
  </header>

  <main>
    <!-- Cards render here from the manifest below. -->
    <ul class="grid" id="grid"></ul>
  </main>

  <footer>
    <p>Inspired by <a href="https://explainers.blog" rel="noopener">explainers.blog</a> and <a href="https://paraschopra.github.io/explainers/" rel="noopener">Paras Chopra's explainers</a>.</p>
  </footer>

</div>

<script>
/* ════════════════════════════════════════════════════════════════════════
   EXPLAINERS manifest — the single source of truth for the landing page.
   To add an explainer: create /<slug>/index.html, then PREPEND one entry
   here (newest first). No build step; this renders client-side.
   ════════════════════════════════════════════════════════════════════════ */
const EXPLAINERS = [
  { slug: 'fractals', title: 'How can a shape be infinitely detailed?',
    description: 'Self-similarity, the coastline paradox, fractal dimension, and the Mandelbrot set — all from simple rules you can play with.',
    date: 'Jun 2026' },
  // { slug: 'fourier-transform', title: 'How does Shazam know what song is playing?',
  //   description: 'The Fourier Transform, built up from a single pure tone.', date: 'Jun 2026' },
];

/* Hues are assigned by position and cycle, so adding an explainer needs no
   per-entry color — the manifest entry above stays a single line. */
const PALETTE = ['hue-blue', 'hue-teal', 'hue-amber', 'hue-violet', 'hue-rose', 'hue-green'];

(function renderGrid() {
  const grid = document.getElementById('grid');

  if (EXPLAINERS.length === 0) {
    grid.outerHTML =
      '<div class="empty">' +
        '<p><strong>No explainers yet.</strong></p>' +
        '<p>Add one by copying <code>template/</code> to <code>your-slug/</code>, ' +
        'then prepend an entry to the <code>EXPLAINERS</code> array in <code>index.html</code>.</p>' +
      '</div>';
    return;
  }

  // Build cards. Each links to ./<slug>/ (relative — works under the Pages subpath)
  // and gets a cycling hue class; the date renders first as a colored eyebrow.
  grid.innerHTML = EXPLAINERS.map(function (e, i) {
    var hue = PALETTE[i % PALETTE.length];
    return (
      '<li>' +
        '<a class="card ' + hue + '" href="./' + encodeURIComponent(e.slug) + '/">' +
          '<span class="date">' + escapeHtml(e.date) + '</span>' +
          '<h2>' + escapeHtml(e.title) + '</h2>' +
          '<p>' + escapeHtml(e.description) + '</p>' +
        '</a>' +
      '</li>'
    );
  }).join('');

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }
})();
</script>
</body>
</html>
